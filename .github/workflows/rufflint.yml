name: Ruff Lint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ruff check（リント）を実行
      - uses: astral-sh/ruff-action@v3

      # ruff format --check（フォーマットチェック）を実行
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"